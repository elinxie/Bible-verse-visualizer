name: Deploy chat Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - api/chat-worker.js
      - wrangler.toml
      - .github/workflows/deploy-chat-worker.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install --no-save wrangler@latest

      - name: Configure Gemini API key secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY repository secret is required." >&2
            exit 1
          fi
          printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
