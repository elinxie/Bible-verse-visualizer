<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="Browser sends passage context to Cloudflare Worker, which calls Gemini and returns checked answer">
  <rect width="980" height="360" fill="#f6efe0"/>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#8c5a2b"/></marker></defs>
  <g font-family="Georgia,serif" fill="#2b2115">
    <rect x="55" y="90" width="230" height="150" rx="18" fill="#fffdf6" stroke="#d8c9a8" stroke-width="3"/>
    <text x="170" y="135" text-anchor="middle" font-size="26">Browser</text><text x="170" y="173" text-anchor="middle" font-size="17">passage + question</text><text x="170" y="203" text-anchor="middle" font-size="17">no API key</text>
    <rect x="375" y="90" width="230" height="150" rx="18" fill="#fffdf6" stroke="#d8c9a8" stroke-width="3"/>
    <text x="490" y="135" text-anchor="middle" font-size="26">Cloudflare Worker</text><text x="490" y="173" text-anchor="middle" font-size="17">keeps secret safe</text><text x="490" y="203" text-anchor="middle" font-size="17">checks JSON response</text>
    <rect x="695" y="90" width="230" height="150" rx="18" fill="#fffdf6" stroke="#d8c9a8" stroke-width="3"/>
    <text x="810" y="135" text-anchor="middle" font-size="26">Gemini API</text><text x="810" y="173" text-anchor="middle" font-size="17">generates answer</text><text x="810" y="203" text-anchor="middle" font-size="17">from supplied context</text>
    <path d="M285 165 H365" stroke="#8c5a2b" stroke-width="5" marker-end="url(#a)"/><path d="M605 165 H685" stroke="#8c5a2b" stroke-width="5" marker-end="url(#a)"/>
    <path d="M695 225 C610 305 375 305 285 225" fill="none" stroke="#1d6b5a" stroke-width="4" marker-end="url(#a)"/><text x="490" y="320" text-anchor="middle" font-size="18" fill="#1d6b5a">checked answer returns to chat panel</text>
  </g>
</svg>
