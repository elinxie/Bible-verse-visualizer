<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" role="img" aria-label="Study chat panel example">
  <rect width="760" height="560" fill="#f6efe0"/>
  <rect x="110" y="45" width="540" height="470" rx="16" fill="#fffdf6" stroke="#d8c9a8" stroke-width="3"/>
  <rect x="110" y="45" width="540" height="58" rx="16" fill="#ece1c8"/><text x="140" y="82" font-family="Georgia,serif" font-size="24" fill="#6b3f1d" font-weight="700">💬 Ask About This Passage</text><text x="565" y="82" font-family="Georgia,serif" font-size="14" fill="#5a4a33" text-anchor="middle">passage-grounded AI</text>
  <rect x="140" y="130" width="480" height="85" rx="12" fill="#f4ead4"/><text x="165" y="160" font-family="Georgia,serif" font-size="15" fill="#6b3f1d" font-weight="700">Study Chat</text><text x="165" y="188" font-family="Georgia,serif" font-size="17" fill="#2b2115">Ask me about 1 Samuel 28. I will answer from</text><text x="165" y="210" font-family="Georgia,serif" font-size="17" fill="#2b2115">the passage shown and check before sending.</text>
  <rect x="260" y="245" width="360" height="62" rx="12" fill="#dfeeea"/><text x="285" y="275" font-family="Georgia,serif" font-size="15" fill="#1d6b5a" font-weight="700">You</text><text x="285" y="298" font-family="Georgia,serif" font-size="17" fill="#2b2115">What is Saul afraid of?</text>
  <rect x="140" y="335" width="480" height="80" rx="12" fill="#f4ead4"/><text x="165" y="365" font-family="Georgia,serif" font-size="15" fill="#6b3f1d" font-weight="700">Study Chat</text><text x="165" y="392" font-family="Georgia,serif" font-size="17" fill="#2b2115">Saul is afraid because the Philistine army</text><text x="165" y="414" font-family="Georgia,serif" font-size="17" fill="#2b2115">has gathered against Israel (vv. 4–5).</text>
  <rect x="140" y="445" width="385" height="42" rx="8" fill="white" stroke="#d8c9a8"/><text x="158" y="472" font-family="Georgia,serif" font-size="16" fill="#8a806f">Ask a question about this passage…</text><rect x="535" y="445" width="85" height="42" rx="8" fill="#c9a227"/><text x="578" y="472" text-anchor="middle" font-family="Georgia,serif" font-size="17" fill="#3a2a10" font-weight="700">Ask</text>
</svg>
